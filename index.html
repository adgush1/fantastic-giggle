<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07071a;
  --card: rgba(255,255,255,0.045);
  --card-border: rgba(255,255,255,0.09);
  --shadow: 0 8px 32px rgba(0,0,0,0.55);
  --primary: #8b5cf6;
  --primary-glow: rgba(139,92,246,0.3);
  --cyan: #06b6d4;
  --correct: #10b981;
  --correct-bg: rgba(16,185,129,0.15);
  --incorrect: #f43f5e;
  --incorrect-bg: rgba(244,63,94,0.15);
  --text: #f0f0ff;
  --muted: #6b7280;
  --radius: 14px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background ── */
#stars-canvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 60%, rgba(139,92,246,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 85% 15%, rgba(6,182,212,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 40% 35% at 65% 90%, rgba(249,115,22,0.07) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* ── App ── */
#app {
  position: relative; z-index: 1;
  max-width: 700px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

/* ── Header ── */
.app-header {
  text-align: center;
  margin-bottom: 2.5rem;
  padding-top: 0.25rem;
}

.logo-glow {
  font-size: 2.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #a78bfa 0%, #06b6d4 55%, #f97316 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
  line-height: 1.1;
  filter: drop-shadow(0 0 30px rgba(139,92,246,0.35));
}

.tagline { color: var(--muted); font-size: 1rem; margin-top: 0.5rem; }

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.2rem;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: var(--shadow);
}

.section-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}

.section-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.link-btn {
  background: none;
  border: none;
  color: var(--primary);
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  padding: 0.2rem 0.5rem;
  border-radius: 5px;
  transition: background 0.2s;
}
.link-btn:hover { background: rgba(139,92,246,0.12); }

/* ── Mode Tabs ── */
.mode-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}

.mode-tab {
  padding: 0.8rem;
  border-radius: 11px;
  border: 2px solid var(--card-border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.mode-tab:hover { border-color: var(--primary); color: var(--text); }
.mode-tab.active {
  border-color: var(--primary);
  background: rgba(139,92,246,0.13);
  color: var(--text);
  box-shadow: 0 0 18px var(--primary-glow);
}

/* ── Teams Setup ── */
#teams-setup {
  margin-top: 1.25rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--card-border);
  display: none;
}

.team-count-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
  font-size: 0.88rem;
  color: var(--muted);
}

.count-pills { display: flex; gap: 0.4rem; }

.count-pill {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--card-border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.count-pill:hover { border-color: var(--primary); color: var(--text); }
.count-pill.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 0 14px var(--primary-glow);
}

#team-inputs { display: flex; flex-direction: column; gap: 0.6rem; }

.team-input-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.team-color-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

.team-name-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--card-border);
  border-radius: 9px;
  padding: 0.6rem 0.9rem;
  color: var(--text);
  font-family: inherit;
  font-size: 0.92rem;
  transition: border-color 0.2s;
}
.team-name-input:focus { outline: none; border-color: var(--primary); }
.team-name-input::placeholder { color: var(--muted); }

/* ── Topics ── */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.55rem;
}

.topic-chip {
  padding: 0.65rem 0.75rem;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 0.45rem;
  font-size: 0.88rem;
  font-weight: 500;
  user-select: none;
}
.topic-chip:hover { border-color: var(--primary); background: rgba(139,92,246,0.08); }
.topic-chip.selected {
  border-color: var(--primary);
  background: rgba(139,92,246,0.15);
  box-shadow: 0 0 12px rgba(139,92,246,0.2);
}
.topic-icon { font-size: 1rem; line-height: 1; }

/* ── Difficulty ── */
.diff-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.55rem;
}

.diff-chip {
  padding: 0.65rem 0.4rem;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: transparent;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 700;
  transition: all 0.2s;
  user-select: none;
}
.diff-chip[data-d="easy"]   { color: #10b981; }
.diff-chip[data-d="medium"] { color: #f59e0b; }
.diff-chip[data-d="hard"]   { color: #f43f5e; }
.diff-chip[data-d="mixed"]  { color: #a78bfa; }
.diff-chip:hover { background: rgba(255,255,255,0.04); }
.diff-chip.selected[data-d="easy"]   { border-color: #10b981; background: rgba(16,185,129,0.13); box-shadow: 0 0 12px rgba(16,185,129,0.22); }
.diff-chip.selected[data-d="medium"] { border-color: #f59e0b; background: rgba(245,158,11,0.13); box-shadow: 0 0 12px rgba(245,158,11,0.22); }
.diff-chip.selected[data-d="hard"]   { border-color: #f43f5e; background: rgba(244,63,94,0.13);  box-shadow: 0 0 12px rgba(244,63,94,0.22); }
.diff-chip.selected[data-d="mixed"]  { border-color: #a78bfa; background: rgba(167,139,250,0.13); box-shadow: 0 0 12px rgba(167,139,250,0.22); }

/* ── Count ── */
.q-count-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.55rem;
}

.q-chip {
  padding: 0.65rem 0.4rem;
  border-radius: 10px;
  border: 1.5px solid var(--card-border);
  background: transparent;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text);
  transition: all 0.2s;
  user-select: none;
}
.q-chip:hover { background: rgba(255,255,255,0.04); border-color: var(--primary); }
.q-chip.selected {
  border-color: var(--primary);
  background: rgba(139,92,246,0.16);
  box-shadow: 0 0 12px var(--primary-glow);
}

/* ── Start Button ── */
.warn-msg {
  text-align: center;
  color: #f59e0b;
  font-size: 0.88rem;
  margin-bottom: 0.75rem;
  min-height: 1.3em;
}

.btn-primary {
  width: 100%;
  padding: 1rem;
  font-size: 1.05rem;
  font-weight: 700;
  font-family: inherit;
  background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.22s;
  box-shadow: 0 4px 22px rgba(139,92,246,0.38);
  position: relative; overflow: hidden;
  letter-spacing: 0.01em;
}
.btn-primary::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.btn-primary:hover:not(:disabled)::after { opacity: 1; }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 7px 28px rgba(139,92,246,0.52);
}
.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-primary:disabled {
  opacity: 0.32;
  cursor: not-allowed;
  box-shadow: none;
}

/* ── Screen Transitions ── */
.screen { display: none; }
.screen.active { display: block; animation: screenIn 0.32s ease forwards; }

@keyframes screenIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Handoff Screen ── */
#handoff-screen {
  min-height: calc(100vh - 4rem);
  display: none;
  align-items: center;
  justify-content: center;
}
#handoff-screen.active {
  display: flex;
  animation: screenIn 0.32s ease forwards;
}

.handoff-card {
  text-align: center;
  padding: 3rem 2rem;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  backdrop-filter: blur(14px);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 460px;
}

.handoff-emoji { font-size: 4rem; display: block; margin-bottom: 0.75rem; }
.handoff-team-badge {
  display: inline-block;
  padding: 0.35rem 1.25rem;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 1.2rem;
}
.handoff-title { font-size: 1.9rem; font-weight: 700; margin-bottom: 0.5rem; }
.handoff-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.25rem; }
.handoff-q-pill {
  display: inline-block;
  padding: 0.3rem 1rem;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  font-size: 0.82rem;
  color: var(--muted);
  margin-bottom: 2rem;
}

/* ── Quiz Screen ── */
.team-bar {
  display: none;
  align-items: center;
  gap: 0.65rem;
  padding: 0.55rem 1rem;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  margin-bottom: 1rem;
  backdrop-filter: blur(10px);
}
.team-bar.visible { display: flex; }
.team-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.team-bar-label { font-size: 0.85rem; font-weight: 600; }
.team-bar-score { margin-left: auto; font-size: 0.82rem; color: var(--muted); }

.progress-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}
.prog-text { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
.prog-track {
  flex: 1;
  height: 5px;
  background: rgba(255,255,255,0.09);
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--cyan));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.score-text { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }

.question-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 1.75rem;
  margin-bottom: 1.1rem;
  backdrop-filter: blur(12px);
}
.q-meta {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 0.75rem;
}
.q-text {
  font-size: 1.18rem;
  font-weight: 500;
  line-height: 1.55;
}

/* ── Choices ── */
.choices { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.1rem; }

.choice-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0.85rem 1.1rem;
  background: var(--card);
  border: 1.5px solid var(--card-border);
  border-radius: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.93rem;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: all 0.18s;
  backdrop-filter: blur(8px);
}
.choice-btn:hover:not(:disabled) {
  border-color: var(--primary);
  background: rgba(139,92,246,0.1);
  transform: translateX(4px);
}
.choice-btn:disabled { cursor: default; }

.choice-letter {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 0.78rem;
  flex-shrink: 0;
  transition: all 0.2s;
}

.choice-btn.correct {
  border-color: var(--correct);
  background: var(--correct-bg);
  box-shadow: 0 0 20px rgba(16,185,129,0.22);
  animation: correctPop 0.35s ease;
}
.choice-btn.correct .choice-letter {
  background: var(--correct);
  border-color: var(--correct);
  color: white;
}
.choice-btn.incorrect {
  border-color: var(--incorrect);
  background: var(--incorrect-bg);
  animation: shake 0.38s ease;
}
.choice-btn.incorrect .choice-letter {
  background: var(--incorrect);
  border-color: var(--incorrect);
  color: white;
}

@keyframes correctPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.018); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-7px); }
  75%     { transform: translateX(7px); }
}

/* ── Results ── */
#results-screen .app-header { margin-bottom: 1.5rem; }

.single-result-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  text-align: center;
  margin-bottom: 1.5rem;
  backdrop-filter: blur(12px);
}

.score-big {
  font-size: 3.8rem;
  font-weight: 700;
  line-height: 1;
  background: linear-gradient(135deg, #a78bfa, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.3rem;
}
.score-pct { font-size: 1.2rem; color: var(--muted); margin-bottom: 1rem; }
.perf-msg { font-size: 1.1rem; font-weight: 500; }

.leaderboard { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.5rem; }
.lb-row {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  padding: 1rem 1.25rem;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  backdrop-filter: blur(12px);
}
.lb-row.top {
  border-width: 2px;
  background: rgba(139,92,246,0.08);
  box-shadow: 0 0 20px rgba(139,92,246,0.15);
}
.lb-rank { font-size: 1.5rem; width: 2rem; text-align: center; flex-shrink: 0; }
.lb-dot  { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.lb-name { flex: 1; font-weight: 600; font-size: 1rem; }
.lb-score { font-weight: 700; font-size: 0.95rem; }
.lb-pct  { color: var(--muted); font-size: 0.8rem; margin-left: 0.25rem; }

/* ── Responsive ── */
@media (max-width: 550px) {
  .logo-glow    { font-size: 2.1rem; }
  .topic-grid   { grid-template-columns: repeat(2, 1fr); }
  .diff-grid    { grid-template-columns: repeat(2, 1fr); }
  .q-text       { font-size: 1.05rem; }
  .handoff-card { padding: 2rem 1.25rem; }
  .handoff-title { font-size: 1.55rem; }
  .score-big    { font-size: 3rem; }
}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="app">

  <!-- ══ SETTINGS SCREEN ══ -->
  <div id="settings-screen" class="screen active">
    <div class="app-header">
      <div class="logo-glow">Trivia Quest</div>
      <p class="tagline">Test your knowledge across the universe</p>
    </div>

    <!-- Game Mode -->
    <div class="card">
      <div class="section-label">Game Mode</div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="single">👤 Single Player</button>
        <button class="mode-tab" data-mode="teams">👥 Teams</button>
      </div>
      <div id="teams-setup">
        <div class="team-count-row">
          <span>Number of teams:</span>
          <div class="count-pills" id="count-pills">
            <button class="count-pill active" data-n="2">2</button>
            <button class="count-pill" data-n="3">3</button>
            <button class="count-pill" data-n="4">4</button>
          </div>
        </div>
        <div id="team-inputs"></div>
      </div>
    </div>

    <!-- Topics -->
    <div class="card">
      <div class="section-row">
        <div class="section-label" style="margin-bottom:0">Topics</div>
        <button class="link-btn" id="select-all-btn">Select All</button>
      </div>
      <div class="topic-grid" id="topic-grid"></div>
    </div>

    <!-- Difficulty -->
    <div class="card">
      <div class="section-label">Difficulty</div>
      <div class="diff-grid" id="diff-grid"></div>
    </div>

    <!-- Count -->
    <div class="card">
      <div class="section-label">Number of Questions</div>
      <div class="q-count-grid" id="q-count-grid"></div>
    </div>

    <div class="warn-msg" id="warn-msg"></div>
    <button class="btn-primary" id="start-btn" disabled>Start Quiz →</button>
  </div>

  <!-- ══ HANDOFF SCREEN ══ -->
  <div id="handoff-screen" class="screen">
    <div class="handoff-card">
      <span class="handoff-emoji" id="handoff-emoji">🎯</span>
      <div class="handoff-team-badge" id="handoff-badge"></div>
      <h2 class="handoff-title">Your turn!</h2>
      <p class="handoff-sub" id="handoff-sub">Pass the device to your team, then get ready.</p>
      <div class="handoff-q-pill" id="handoff-q-pill"></div>
      <button class="btn-primary" id="ready-btn">We're Ready! 🚀</button>
    </div>
  </div>

  <!-- ══ QUIZ SCREEN ══ -->
  <div id="quiz-screen" class="screen">
    <div class="team-bar" id="team-bar">
      <div class="team-dot" id="team-bar-dot"></div>
      <span class="team-bar-label" id="team-bar-label"></span>
      <span class="team-bar-score" id="team-bar-score"></span>
    </div>
    <div class="progress-row">
      <span class="prog-text" id="prog-text"></span>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <span class="score-text" id="score-text"></span>
    </div>
    <div class="question-card">
      <div class="q-meta" id="q-meta"></div>
      <p class="q-text" id="q-text"></p>
    </div>
    <div class="choices" id="choices"></div>
    <button class="btn-primary" id="next-btn" style="display:none">Next →</button>
  </div>

  <!-- ══ RESULTS SCREEN ══ -->
  <div id="results-screen" class="screen">
    <div class="app-header">
      <div class="logo-glow">Results</div>
    </div>
    <div id="results-body"></div>
    <button class="btn-primary" id="play-again-btn">Play Again</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  STARS ANIMATION
// ══════════════════════════════════════════
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkStars() {
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.2,
      vy: Math.random() * 0.12 + 0.03,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.018 + 0.006,
      hue: Math.random() < 0.12 ? 'purple' : Math.random() < 0.14 ? 'cyan' : 'white'
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.phase += s.speed;
      const alpha = 0.25 + 0.7 * (Math.sin(s.phase) * 0.5 + 0.5);
      const color = s.hue === 'purple' ? `rgba(167,139,250,${alpha})`
                  : s.hue === 'cyan'   ? `rgba(103,232,249,${alpha})`
                  : `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      s.y -= s.vy;
      if (s.y < -4) { s.y = H + 4; s.x = Math.random() * W; }
    });
    requestAnimationFrame(draw);
  }

  resize(); mkStars(); draw();
  window.addEventListener('resize', () => { resize(); mkStars(); });
})();

// ══════════════════════════════════════════
//  TEAM COLORS
// ══════════════════════════════════════════
const TEAM_COLORS = ['#f97316', '#06b6d4', '#a855f7', '#10b981'];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const state = {
  mode: 'single',
  teamCount: 2,
  teams: [],         // [{name, score, color}]
  teamIdx: 0,
  questions: [],
  qIdx: 0,
  score: 0,
  total: 0,
  selectedDiff: 'easy',
  selectedCount: 10
};

// ══════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════
const SCREENS = {
  settings: document.getElementById('settings-screen'),
  handoff:  document.getElementById('handoff-screen'),
  quiz:     document.getElementById('quiz-screen'),
  results:  document.getElementById('results-screen')
};

function showScreen(name) {
  Object.values(SCREENS).forEach(s => s.classList.remove('active'));
  SCREENS[name].classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════
//  SETTINGS SETUP
// ══════════════════════════════════════════

// Mode tabs
document.querySelectorAll('.mode-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    document.getElementById('teams-setup').style.display =
      state.mode === 'teams' ? 'block' : 'none';
  });
});

// Team count pills
document.getElementById('count-pills').addEventListener('click', e => {
  const pill = e.target.closest('.count-pill');
  if (!pill) return;
  document.querySelectorAll('.count-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  state.teamCount = parseInt(pill.dataset.n);
  renderTeamInputs();
});

function renderTeamInputs() {
  const container = document.getElementById('team-inputs');
  container.innerHTML = '';
  for (let i = 0; i < state.teamCount; i++) {
    const row = document.createElement('div');
    row.className = 'team-input-row';
    const dot = document.createElement('div');
    dot.className = 'team-color-dot';
    dot.style.background = TEAM_COLORS[i];
    const input = document.createElement('input');
    input.className = 'team-name-input';
    input.type = 'text';
    input.placeholder = `Team ${i + 1}`;
    input.dataset.idx = i;
    row.append(dot, input);
    container.appendChild(row);
  }
}
renderTeamInputs();

// Topics
const topicGrid = document.getElementById('topic-grid');
Object.entries(BANK).forEach(([name, data]) => {
  const chip = document.createElement('div');
  chip.className = 'topic-chip';
  chip.dataset.topic = name;
  chip.innerHTML = `<span class="topic-icon">${data.icon}</span><span>${name}</span>`;
  chip.addEventListener('click', () => {
    chip.classList.toggle('selected');
    updateStart();
  });
  topicGrid.appendChild(chip);
});

document.getElementById('select-all-btn').addEventListener('click', () => {
  const chips = topicGrid.querySelectorAll('.topic-chip');
  const allOn = [...chips].every(c => c.classList.contains('selected'));
  chips.forEach(c => c.classList.toggle('selected', !allOn));
  document.getElementById('select-all-btn').textContent = allOn ? 'Select All' : 'Deselect All';
  updateStart();
});

// Difficulty
const diffGrid = document.getElementById('diff-grid');
[['easy','Easy'],['medium','Medium'],['hard','Hard'],['mixed','Mixed']].forEach(([val, label], i) => {
  const chip = document.createElement('div');
  chip.className = 'diff-chip' + (i === 0 ? ' selected' : '');
  chip.dataset.d = val;
  chip.textContent = label;
  chip.addEventListener('click', () => {
    diffGrid.querySelectorAll('.diff-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    state.selectedDiff = val;
  });
  diffGrid.appendChild(chip);
});

// Count
const qGrid = document.getElementById('q-count-grid');
[5, 10, 15, 20].forEach((n, i) => {
  const chip = document.createElement('div');
  chip.className = 'q-chip' + (i === 1 ? ' selected' : '');
  chip.textContent = n;
  chip.addEventListener('click', () => {
    qGrid.querySelectorAll('.q-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    state.selectedCount = n;
  });
  qGrid.appendChild(chip);
});

function updateStart() {
  const anyTopic = topicGrid.querySelector('.topic-chip.selected');
  const allSel = [...topicGrid.querySelectorAll('.topic-chip')].every(c => c.classList.contains('selected'));
  document.getElementById('select-all-btn').textContent = allSel ? 'Deselect All' : 'Select All';
  document.getElementById('start-btn').disabled = !anyTopic;
}

// ══════════════════════════════════════════
//  QUIZ LOGIC
// ══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

document.getElementById('start-btn').addEventListener('click', () => {
  const topics = [...topicGrid.querySelectorAll('.topic-chip.selected')].map(c => c.dataset.topic);
  const diff   = state.selectedDiff;
  const count  = state.selectedCount;

  // Build question pool
  let pool = [];
  topics.forEach(t => {
    const bank = BANK[t];
    if (diff === 'mixed') {
      ['easy','medium','hard'].forEach(d => pool.push(...bank[d]));
    } else {
      pool.push(...bank[diff]);
    }
  });

  shuffle(pool);
  state.questions = pool.slice(0, Math.min(count, pool.length));
  state.total     = state.questions.length;
  state.qIdx      = 0;
  state.score     = 0;

  const warn = document.getElementById('warn-msg');
  if (pool.length === 0) {
    warn.textContent = 'No questions available for this selection.';
    return;
  }
  warn.textContent = pool.length < count
    ? `Only ${state.total} questions available — starting with those.`
    : '';

  // Setup teams
  if (state.mode === 'teams') {
    const inputs = document.querySelectorAll('.team-name-input');
    state.teams = Array.from({ length: state.teamCount }, (_, i) => ({
      name:  inputs[i]?.value.trim() || `Team ${i + 1}`,
      score: 0,
      color: TEAM_COLORS[i]
    }));
    state.teamIdx = 0;
    showHandoff();
  } else {
    showScreen('quiz');
    renderQuestion();
  }
});

// ── Handoff ──
function showHandoff() {
  const team = state.teams[state.teamIdx];
  const qNum = state.qIdx + 1;
  document.getElementById('handoff-badge').textContent = team.name;
  document.getElementById('handoff-badge').style.background = team.color + '22';
  document.getElementById('handoff-badge').style.color = team.color;
  document.getElementById('handoff-badge').style.border = `2px solid ${team.color}`;
  document.getElementById('handoff-sub').textContent =
    `Pass the device to ${team.name}, then tap when ready.`;
  document.getElementById('handoff-q-pill').textContent =
    `Question ${qNum} of ${state.total}`;
  showScreen('handoff');
}

document.getElementById('ready-btn').addEventListener('click', () => {
  showScreen('quiz');
  renderQuestion();
});

// ── Render Question ──
function renderQuestion() {
  const q    = state.questions[state.qIdx];
  const num  = state.qIdx + 1;

  // Progress
  document.getElementById('prog-text').textContent  = `${num} / ${state.total}`;
  document.getElementById('prog-fill').style.width  = `${(num / state.total) * 100}%`;

  // Team bar
  const bar = document.getElementById('team-bar');
  if (state.mode === 'teams') {
    const team = state.teams[state.teamIdx];
    bar.classList.add('visible');
    document.getElementById('team-bar-dot').style.background = team.color;
    document.getElementById('team-bar-label').textContent = team.name;
    document.getElementById('team-bar-score').textContent = `Score: ${team.score}`;
    document.getElementById('score-text').textContent = '';
  } else {
    bar.classList.remove('visible');
    document.getElementById('score-text').textContent = `Score: ${state.score}`;
  }

  // Question
  document.getElementById('q-meta').textContent = `Question ${num}`;
  document.getElementById('q-text').textContent = q.q;

  // Choices
  const letters = ['A','B','C','D'];
  const container = document.getElementById('choices');
  container.innerHTML = '';
  q.c.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${choice}</span>`;
    btn.addEventListener('click', () => handleAnswer(i));
    container.appendChild(btn);
  });

  document.getElementById('next-btn').style.display = 'none';
}

// ── Handle Answer ──
function handleAnswer(selected) {
  const q    = state.questions[state.qIdx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  const correct = selected === q.a;
  if (correct) {
    if (state.mode === 'teams') state.teams[state.teamIdx].score++;
    else state.score++;
  }

  btns[selected].classList.add(correct ? 'correct' : 'incorrect');
  if (!correct) btns[q.a].classList.add('correct');

  if (state.mode === 'teams') {
    document.getElementById('team-bar-score').textContent =
      `Score: ${state.teams[state.teamIdx].score}`;
  } else {
    document.getElementById('score-text').textContent = `Score: ${state.score}`;
  }

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = state.qIdx < state.total - 1 ? 'Next →' : 'See Results →';
  nextBtn.style.display = 'block';
}

// ── Next ──
document.getElementById('next-btn').addEventListener('click', () => {
  state.qIdx++;
  if (state.qIdx >= state.total) {
    showResults();
    return;
  }
  if (state.mode === 'teams') {
    state.teamIdx = state.qIdx % state.teams.length;
    showHandoff();
  } else {
    renderQuestion();
  }
});

// ── Results ──
function showResults() {
  const body = document.getElementById('results-body');
  body.innerHTML = '';

  if (state.mode === 'single') {
    const pct = Math.round((state.score / state.total) * 100);
    const msg = pct === 100 ? '🌟 Perfect score! Legendary!'
              : pct >= 80   ? '🔥 Excellent work!'
              : pct >= 60   ? '👍 Good effort, keep it up!'
              : pct >= 40   ? '📚 Not bad — room to grow!'
              :               '💪 Keep studying, you\'ll get there!';
    body.innerHTML = `
      <div class="single-result-card">
        <div class="score-big">${state.score} / ${state.total}</div>
        <div class="score-pct">${pct}%</div>
        <div class="perf-msg">${msg}</div>
      </div>`;
  } else {
    const sorted = [...state.teams].sort((a, b) => b.score - a.score);
    const medals = ['🥇','🥈','🥉','4️⃣'];
    const rows = sorted.map((team, i) => {
      const pct = Math.round((team.score / state.total) * 100);
      return `<div class="lb-row ${i === 0 ? 'top' : ''}">
        <div class="lb-rank">${medals[i]}</div>
        <div class="lb-dot" style="background:${team.color}"></div>
        <div class="lb-name">${team.name}</div>
        <div class="lb-score">${team.score}<span class="lb-pct">${pct}%</span></div>
      </div>`;
    }).join('');
    body.innerHTML = `<div class="leaderboard">${rows}</div>`;
  }

  showScreen('results');
}

document.getElementById('play-again-btn').addEventListener('click', () => showScreen('settings'));

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (!SCREENS.quiz.classList.contains('active')) return;
  const btns = document.querySelectorAll('.choice-btn');
  if (!btns.length) return;
  const map = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
  const idx = map[e.key.toLowerCase()];
  if (idx !== undefined && !btns[0].disabled) btns[idx]?.click();
  if ((e.key === 'Enter' || e.key === ' ') && btns[0].disabled) {
    e.preventDefault();
    document.getElementById('next-btn').click();
  }
});
</script>
